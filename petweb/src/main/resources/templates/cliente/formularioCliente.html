<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Clientes</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <h1 class="textPrincipal">Cadastro de Clientes</h1>
    <form th:action="@{/clientes/salvar}" method="post" th:object="${cliente}">

        <h2 class="tituloForm">Formulário de Cliente</h2>
        <input type="hidden" th:field="*{idCliente}">

        <label for="nomeCliente">Nome:</label>
        <input type="text" id="nomeCliente" th:field="*{nomeCliente}"><br><br>

        <label for="emailCliente">Email:</label>
        <input type="email" id="emailCliente" th:field="*{emailCliente}"><br><br>

        <label for="telefoneCliente">Telefone:</label>
        <input type="text" id="telefoneCliente" th:field="*{telefoneCliente}"><br><br>

        <label for="enderecoCliente">Endereço:</label>
        <input type="text" id="enderecoCliente" th:field="*{enderecoCliente}"><br><br>

        <label for="cpfCliente">Cpf:</label>
        <input type="text" id="cpfCliente" th:field="*{cpfCliente}"><br><br>

        <button type="submit">Salvar</button>

    </form>
    <br><br>

    <button><a href="/petweb">Voltar</a></button>
    
</body>
</html>
