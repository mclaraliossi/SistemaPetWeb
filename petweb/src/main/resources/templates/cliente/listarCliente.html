<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listagem de Cliente</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <h1 class="textPrincipal">Listagem de clientes</h1>
    <h3><a th:href="@{/clientes/criar}">Criar novo cliente</a></h3>
    <table border="1" align="center">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Email</th>
                <th>Telefone</th>
                <th>Endereço</th>
                <th>CPF</th>
                <th colspan="2">Ações</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="cliente : ${clientes}">
                <td th:text="${cliente.nomeCliente}"></td>
                <td th:text="${cliente.emailCliente}"></td>
                <td th:text="${cliente.telefoneCliente}"></td>
                <td th:text="${cliente.enderecoCliente}"></td>
                <td th:text="${cliente.cpfCliente}"></td>
                <td>
                    <a th:href="@{/clientes/editar/{id}(id=${cliente.idCliente})}">Editar</a>
                    <a th:href="@{/clientes/excluir/{id}(id=${cliente.idCliente})}">Excluir</a>
                </td>


            </tr>
        </tbody>

    </table>
    <button><a href="/petweb">Voltar</a></button>

    
</body>
</html>
